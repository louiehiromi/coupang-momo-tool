<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupang 配貨天花板計算器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
    color: #1a1a1a;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    border: 0.5px solid #e0ddd5;
    padding: 2rem;
    width: 100%;
    max-width: 560px;
  }

  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
    gap: 12px;
  }

  .page-title {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 4px;
  }

  .page-sub {
    font-size: 13px;
    color: #888780;
  }

  .clear-btn {
    flex-shrink: 0;
    padding: 7px 14px;
    font-size: 12px;
    font-family: inherit;
    color: #888780;
    background: transparent;
    border: 0.5px solid #d3d1c7;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .clear-btn:hover {
    background: #f5f4f0;
    color: #1a1a1a;
    border-color: #888780;
  }

  .clear-btn:active {
    transform: scale(0.97);
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888780;
    margin-bottom: 10px;
  }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .brand-label {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .dot-momo { background: #D85A30; }
  .dot-cp { background: #378ADD; }

  .input-hint {
    font-size: 12px;
    color: #b4b2a9;
  }

  input[type=number] {
    width: 100%;
    padding: 9px 12px;
    font-size: 15px;
    font-family: inherit;
    border: 0.5px solid #d3d1c7;
    border-radius: 8px;
    background: #ffffff;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type=number]:focus { border-color: #888780; }

  .divider {
    border: none;
    border-top: 0.5px solid #e8e6df;
    margin: 1.5rem 0;
  }

  .growth-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 1.5rem;
  }

  .growth-row label {
    font-size: 13px;
    color: #5f5e5a;
    white-space: nowrap;
  }

  input[type=range] {
    flex: 1;
    height: 4px;
    appearance: none;
    -webkit-appearance: none;
    background: #e0ddd5;
    border-radius: 99px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #378ADD;
    cursor: pointer;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px #d3d1c7;
  }

  .growth-val {
    min-width: 64px;
    text-align: right;
  }

  .growth-val .gv-main {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .growth-val .gv-sub {
    font-size: 11px;
    color: #888780;
  }

  .ceiling-result {
    background: #E6F1FB;
    border: 0.5px solid #378ADD;
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    text-align: center;
  }

  .ceiling-result .cr-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #185FA5;
    margin-bottom: 8px;
  }

  .ceiling-result .cr-value {
    font-size: 48px;
    font-weight: 700;
    color: #0C447C;
    line-height: 1;
    margin-bottom: 6px;
  }

  .ceiling-result .cr-unit {
    font-size: 14px;
    color: #185FA5;
  }

  .ref-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .ref-card {
    background: #f5f4f0;
    border-radius: 10px;
    padding: 12px;
  }

  .ref-card .r-label {
    font-size: 12px;
    color: #888780;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .ref-card .r-value {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .ref-card .r-sub {
    font-size: 11px;
    color: #b4b2a9;
    margin-top: 2px;
  }

  .order-section { margin-bottom: 1.5rem; }

  .order-input-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .order-input-row label {
    font-size: 13px;
    color: #5f5e5a;
    white-space: nowrap;
    min-width: 140px;
  }

  .order-input-row .unit {
    font-size: 13px;
    color: #888780;
  }

  .verdict {
    font-size: 14px;
    font-weight: 500;
    padding: 12px 16px;
    border-radius: 10px;
    border: 0.5px solid;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }

  .verdict-icon { font-size: 18px; line-height: 1; }

  .verdict-accept { background: #eaf3de; color: #27500a; border-color: #97c459; }
  .verdict-reject { background: #fcebeb; color: #501313; border-color: #e24b4a; }
  .verdict-neutral { background: #f5f4f0; color: #5f5e5a; border-color: #d3d1c7; }

  .footer {
    font-size: 11px;
    color: #b4b2a9;
    text-align: center;
    margin-top: 1.5rem;
  }
</style>
</head>
<body>

<div class="card">
  <div class="page-header">
    <div>
      <div class="page-title">Coupang 配貨天花板</div>
      <div class="page-sub">這個月最多可以接多少 Coupang 訂單</div>
    </div>
    <button class="clear-btn" onclick="clearAll()">清除所有數字</button>
  </div>

  <div class="section-label">去年同月銷量（件）</div>
  <div class="input-grid">
    <div class="input-group">
      <div class="brand-label"><span class="dot dot-momo"></span>momo</div>
      <div class="input-hint">去年同月銷量</div>
      <input type="number" id="momo-last" value="" min="0" placeholder="0" oninput="calc()">
    </div>
    <div class="input-group">
      <div class="brand-label"><span class="dot dot-cp"></span>Coupang 酷澎</div>
      <div class="input-hint">去年同月銷量</div>
      <input type="number" id="cp-last" value="" min="0" placeholder="0" oninput="calc()">
    </div>
  </div>

  <hr class="divider">

  <div class="section-label">Coupang 成長目標</div>
  <div class="growth-row">
    <label>成長係數</label>
    <input type="range" id="growth" min="1.0" max="2.0" step="0.05" value="1.2" oninput="calc()">
    <div class="growth-val">
      <div class="gv-main" id="gv-main">× 1.20</div>
      <div class="gv-sub" id="gv-sub">成長 20%</div>
    </div>
  </div>

  <hr class="divider">

  <div class="section-label">本月 Coupang 配貨天花板</div>
  <div class="ceiling-result">
    <div class="cr-label">最多可配貨</div>
    <div class="cr-value" id="ceiling-val">—</div>
    <div class="cr-unit">件／月</div>
  </div>

  <div class="ref-grid">
    <div class="ref-card">
      <div class="r-label"><span class="dot dot-cp"></span>Coupang 去年同月</div>
      <div class="r-value" id="ref-cp-last">—</div>
      <div class="r-sub">件（計算基準）</div>
    </div>
    <div class="ref-card">
      <div class="r-label"><span class="dot dot-momo"></span>momo 去年同月</div>
      <div class="r-value" id="ref-momo-last">—</div>
      <div class="r-sub">件（參考）</div>
    </div>
  </div>

  <hr class="divider">

  <div class="section-label">接單判斷</div>
  <div class="order-section">
    <div class="order-input-row">
      <label>本月已接 Coupang 訂單</label>
      <input type="number" id="order-now" value="" min="0" placeholder="0" oninput="calc()">
      <span class="unit">件</span>
    </div>
    <div class="order-input-row">
      <label>這筆新訂單數量</label>
      <input type="number" id="order-new" value="" min="0" placeholder="0" oninput="calc()">
      <span class="unit">件</span>
    </div>
    <div class="verdict verdict-neutral" id="verdict-box">
      <span class="verdict-icon">—</span>
      <span id="verdict-text">輸入已接訂單與新訂單數量</span>
    </div>
  </div>

  <div class="footer">每月更新去年同期數字 · 成長係數可依業績目標彈性調整</div>
</div>

<script>
function clearAll() {
  document.getElementById('momo-last').value = '';
  document.getElementById('cp-last').value = '';
  document.getElementById('order-now').value = '';
  document.getElementById('order-new').value = '';
  document.getElementById('growth').value = 1.2;
  calc();
}

function calc() {
  var momoLast = Math.max(0, parseInt(document.getElementById('momo-last').value) || 0);
  var cpLast = Math.max(0, parseInt(document.getElementById('cp-last').value) || 0);
  var growth = parseFloat(document.getElementById('growth').value);
  var orderNow = Math.max(0, parseInt(document.getElementById('order-now').value) || 0);
  var orderNew = Math.max(0, parseInt(document.getElementById('order-new').value) || 0);

  var pct = Math.round((growth - 1) * 100);
  document.getElementById('gv-main').textContent = '× ' + growth.toFixed(2);
  document.getElementById('gv-sub').textContent = '成長 ' + pct + '%';

  var hasSalesData = document.getElementById('cp-last').value !== '';

  if (!hasSalesData) {
    document.getElementById('ceiling-val').textContent = '—';
    document.getElementById('ref-cp-last').textContent = '—';
    document.getElementById('ref-momo-last').textContent = '—';
    var verdictBox = document.getElementById('verdict-box');
    verdictBox.className = 'verdict verdict-neutral';
    verdictBox.querySelector('.verdict-icon').textContent = '—';
    document.getElementById('verdict-text').textContent = '輸入已接訂單與新訂單數量';
    return;
  }

  var ceiling = Math.round(cpLast * growth);
  document.getElementById('ceiling-val').textContent = ceiling.toLocaleString();
  document.getElementById('ref-cp-last').textContent = cpLast.toLocaleString();
  document.getElementById('ref-momo-last').textContent = momoLast > 0 ? momoLast.toLocaleString() : '—';

  var afterAccept = orderNow + orderNew;
  var verdictBox = document.getElementById('verdict-box');
  var verdictIcon = verdictBox.querySelector('.verdict-icon');
  var verdictText = document.getElementById('verdict-text');

  if (orderNew === 0 && orderNow === 0) {
    verdictBox.className = 'verdict verdict-neutral';
    verdictIcon.textContent = '—';
    verdictText.textContent = '輸入已接訂單與新訂單數量';
  } else if (orderNow >= ceiling) {
    verdictBox.className = 'verdict verdict-reject';
    verdictIcon.textContent = '✕';
    verdictText.textContent = '本月額度已滿（已接 ' + orderNow.toLocaleString() + ' 件），不建議再接單。';
  } else if (afterAccept <= ceiling) {
    var leftAfter = ceiling - afterAccept;
    verdictBox.className = 'verdict verdict-accept';
    verdictIcon.textContent = '✓';
    verdictText.textContent = '可以接單。接完後本月剩餘額度 ' + leftAfter.toLocaleString() + ' 件。';
  } else {
    var canAccept = ceiling - orderNow;
    verdictBox.className = 'verdict verdict-reject';
    verdictIcon.textContent = '✕';
    verdictText.textContent = '超過天花板 ' + (afterAccept - ceiling).toLocaleString() + ' 件，本月最多還能接 ' + canAccept.toLocaleString() + ' 件。';
  }
}

calc();
</script>
</body>
</html>
